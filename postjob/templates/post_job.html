{% extends 'base.html' %} 

{% load static %}

{% block title %}Post a Jobs - NaijaJobs {% endblock title %}

{% block style %}
<link rel="stylesheet" href="{% static 'css/postjob.css' %}">
{% endblock style %}

{% block main %} 

<section class="post-jobs-page">
    <h1 class="post-job-page-header">
        Post a Job
    </h1>
    <p class="post-job-page-para">
        Reach thousands of Nigerian professionals
    </p>

    <form action="" method="post" class="post-job-form">
        {% csrf_token %}
        <div class="postjob-form-group">
            <label for="job_title">Job Title <span class="required">*</span></label>
            <input type="text" id="job_title" name="job_title" placeholder="e.g. Senior Founder Developer">
        </div>

        <div class="postjob-form-group">
            <label for="company_name">Company Name <span class="required">*</span></label>
            <input type="text" id="company_name" name="company_name" placeholder="e.g. Paystack">
        </div>

        <div class="postjob-form-group">
            <label for="location">Location <span class="required">*</span></label>
            <input type="text" id="location" name="location" placeholder="e.g. Lagos, Nigeria">
        </div>

        <div class="postjob-form-group">
            <label for="job_type">Job Type <span class="required">*</span></label>
            <select name="job_type" id="job_type">
                <option value="">Select job type</option>
                <option value="Full-time">Full-time</option>
                <option value="Remote">Remote</option>
                <option value="Part-time">Part-time</option>
                <option value="Contract">Contract</option>
                <option value="Internship">Internship</option>
            </select>
        </div>

        <div class="postjob-form-group">
            <label for="category">Category <span class="required">*</span></label>
            <select name="category" id="category">
                <option value="">Select category</option>
                <option value="Tech">Tech</option>
                <option value="Design">Design</option>
                <option value="Marketing">Marketing</option>
                <option value="Finance">Finance</option>
                <option value="Legal">Legal</option>
            </select>
        </div>

        <div class="min-max">
            <div class="postjob-form-group min-max">
                <label for="minimum-salary">Minimum Salary<span class="required">*</span></label>
                <input type="number" id="minimum-salary" name="minimum_salary" placeholder="e.g. 5000000">
            </div>

            <div class="postjob-form-group min-max">
                <label for="maximum-salary">Maximum Salary<span class="required">*</span></label>
                <input type="number" id="maximum-salary" name="maximum_salary" placeholder="e.g. 8000000">
            </div>
        </div>

        <div class="postjob-form-group">
            <label for="description">Job Description <span class="required">*</span></label>
            <textarea name="job_description" id="description" rows="20" cols="60" placeholder="Describe the role, responsibilities, requirements and benefits..."></textarea>
        </div>
        <p class="character-count">
            0 character (minimum 50)
        </p>

        <div class="postjob-form-group">
            <label for="email">Application Email <span class="required">*</span></label>
            <input type="email" id="email" name="application_email" placeholder="e.g. careers@company.com">
        </div>

        <button type="submit" class="post-job-btn">
            Post Job <i class="fa-solid fa-arrow-right"></i>
        </button>

    </form>
</section>
{% endblock main %}
