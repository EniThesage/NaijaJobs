{% extends 'base.html' %} 

{% load static %}

{% block title %}Login - NaijaJobs {% endblock title %}

{% block style %}
<link rel="stylesheet" href="{% static 'css/authz.css' %}">
{% endblock style %}

{% block main %}
<section class="login-page">
    <div class="login-page-header">
        <h2 class="login-page-header-text">
            Welcome Back
        </h2>
        <p class="login-page-header-paragraph">
            Log in to your NaijaJobs account
        </p>

        <form action="" method="post" class="login-form">
            {% csrf_token %}

            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-icon-wrap">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="username" name="username" placeholder="Your username" required/>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-icon-wrap">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" id="password" name="password" placeholder="Your password" required/>
                </div>
            </div>

            <button type="submit" class="login-btn">
                Log In <i class="fa-solid fa-arrow-right"></i>
            </button>
        </form>

        <p class="switch-btn">
            Don't have an account? <a href="{% url 'signup' %}">Sign up here</a>
        </p>
    </div>
</section>
{% endblock main %}
